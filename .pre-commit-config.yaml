repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx prettier --write
        language: system
        types_or: [ts, tsx, markdown, json, yaml, css]
        pass_filenames: true

      - id: eslint
        name: eslint
        entry: npm run lint
        language: system
        types_or: [ts, tsx]
        pass_filenames: false

      - id: typecheck
        name: typecheck
        entry: npm run typecheck
        language: system
        types_or: [ts, tsx]
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=8192"]
      - id: check-merge-conflict
      - id: check-case-conflict
